<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>PetSafe | Reporte de Mascotas Extraviadas</title>
    <meta name="description" content="Plataforma PetSafe para reportar mascotas perdidas y encontradas. Llena el formulario para facilitar la recuperación rápida en la comunidad.">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Plataforma PetSafe</h1>
        <p>Ayudando a que cada mascota vuelva a casa. Completa el reporte a continuación.</p>
    </header>

    <main>
        <section class="formulario-contenedor">
            <h2>Reportar Mascota</h2>
            
            <form id="formPetSafe" action="/registro" method="POST">
                
                <div class="grupo-input">
                    <label for="nombreMascota">Nombre de la mascota (si lo sabe):</label>
                    <input type="text" id="nombreMascota" name="nombreMascota" placeholder="Ej. Firulais" required>
                </div>

                <div class="grupo-input">
                    <label for="fechaExtravio">Fecha de extravío:</label>
                    <input type="date" id="fechaExtravio" name="fechaExtravio" required>
                </div>

                <div class="grupo-input">
                    <label for="correoContacto">Tu correo de contacto:</label>
                    <input type="email" id="correoContacto" name="correoContacto" placeholder="usuario@correo.com" required>
                </div>

                <div class="grupo-input">
                    <input type="checkbox" id="aceptoTerminos" name="aceptoTerminos" required>
                    <label for="aceptoTerminos">Confirmo que la información es real.</label>
                </div>

                <input type="submit" value="Enviar Reporte">
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PetSafe. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
